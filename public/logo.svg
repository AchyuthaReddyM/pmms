<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="eagleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A3525"/>
      <stop offset="100%" stop-color="#2E1D0E"/>
    </linearGradient>
  </defs>

  <!-- ============ EAGLE ============ -->
  <g transform="translate(200,150)">
    <!-- Left wing (upper, spread wide) -->
    <path fill="url(#eagleGrad)" d="
      M 0 -10
      C -30 -30, -70 -50, -110 -55
      C -130 -55, -150 -45, -160 -30
      C -150 -32, -135 -33, -120 -28
      C -130 -22, -140 -15, -148 -5
      C -135 -8, -118 -10, -100 -7
      C -110 0, -118 8, -122 18
      C -108 12, -90 8, -72 8
      C -82 18, -90 30, -94 42
      C -78 30, -60 22, -42 18
      C -50 28, -55 38, -56 50
      C -42 38, -28 28, -12 22
      Z" />

    <!-- Right wing (upper, mirrored) -->
    <path fill="url(#eagleGrad)" d="
      M 0 -10
      C 30 -30, 70 -50, 110 -55
      C 130 -55, 150 -45, 160 -30
      C 150 -32, 135 -33, 120 -28
      C 130 -22, 140 -15, 148 -5
      C 135 -8, 118 -10, 100 -7
      C 110 0, 118 8, 122 18
      C 108 12, 90 8, 72 8
      C 82 18, 90 30, 94 42
      C 78 30, 60 22, 42 18
      C 50 28, 55 38, 56 50
      C 42 38, 28 28, 12 22
      Z" />

    <!-- Body / torso -->
    <ellipse cx="0" cy="20" rx="20" ry="38" fill="url(#eagleGrad)"/>

    <!-- Tail feathers (downward) -->
    <path fill="url(#eagleGrad)" d="
      M -16 50
      C -22 70, -16 92, -4 100
      L 0 78
      L 4 100
      C 16 92, 22 70, 16 50
      Z"/>

    <!-- Head & neck (turned right) -->
    <path fill="url(#eagleGrad)" d="
      M 8 -6
      C 22 -10, 32 -4, 38 6
      C 44 14, 44 22, 38 30
      C 32 36, 22 38, 12 34
      C 4 30, 0 22, 2 14
      Z"/>

    <!-- Beak (sharp, pointing right-down) -->
    <path fill="#2E1D0E" d="
      M 36 16
      L 50 22
      L 42 26
      Z"/>

    <!-- Eye highlight -->
    <circle cx="30" cy="14" r="1.5" fill="#FAF6EE"/>

    <!-- Talons holding gold object -->
    <g transform="translate(0, 78)">
      <!-- Gold object (key/leaf) -->
      <path fill="#C9A227" stroke="#B98E1F" stroke-width="0.5" d="
        M -4 2
        C 4 0, 14 4, 18 12
        C 14 8, 6 6, -2 8
        Z"/>
      <path fill="#D9B848" d="M 14 8 L 22 14 L 20 18 L 12 14 Z"/>
      <!-- Talons -->
      <path fill="#2E1D0E" d="M -6 0 L -4 8 L -2 0 Z"/>
      <path fill="#2E1D0E" d="M 0 0 L 2 8 L 4 0 Z"/>
      <path fill="#2E1D0E" d="M 6 0 L 8 8 L 10 0 Z"/>
    </g>

    <!-- Wing feather detail strokes -->
    <path fill="none" stroke="#1d1209" stroke-width="0.5" opacity="0.4" d="
      M -20 -8 C -50 -20, -80 -30, -110 -32
      M -16 4 C -40 -2, -65 -4, -90 -2
      M 20 -8 C 50 -20, 80 -30, 110 -32
      M 16 4 C 40 -2, 65 -4, 90 -2"/>
  </g>

  <!-- ============ TEXT ============ -->
  <g text-anchor="middle">
    <text x="200" y="300" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="700" fill="#2E1D0E" letter-spacing="2">WAYS AUTOMATION</text>
    <text x="200" y="335" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-style="italic" fill="#C9A227" letter-spacing="1">Always at your Service</text>
  </g>
</svg>
