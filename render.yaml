# Render.com infrastructure-as-code for PMMS — FREE TIER (ephemeral)
# Docs: https://render.com/docs/blueprint-spec
#
# Current mode: FREE — no persistent disk.
#   - $0/month
#   - The SQLite database lives inside the container's filesystem.
#   - The DB is RE-SEEDED FROM SCRATCH whenever Render rebuilds, restarts, or
#     wakes the service from sleep (the free plan idles after ~15 min of
#     inactivity). Any plants/equipment/PMs you created in the UI will be lost.
#   - Good for demos and trial runs. NOT suitable for keeping real records.
#
# To upgrade to PERSISTENT data later:
#   1. Change `plan: free` -> `plan: starter` (~$7/mo)
#   2. Set the DB_PATH env var to `/var/data/pmms.db`
#   3. Uncomment the `disk:` block at the bottom (~$0.25/mo for 1 GB)
#
# After connecting this repo to Render:
#   - Set the ADMIN_PASSWORD env var in the dashboard. Do NOT leave it at the
#     default `admin123` if the app will be publicly reachable.

services:
  - type: web
    name: pmms
    runtime: node
    region: singapore   # closest to India; change to oregon / frankfurt / ohio if needed
    plan: free          # change to 'starter' to enable persistent disk below
    branch: main
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # DB_PATH intentionally NOT set in free mode -> defaults to ./pmms.db
      # inside the (ephemeral) container. When you switch to the paid plan,
      # uncomment the next two lines AND uncomment the `disk:` block below.
      # - key: DB_PATH
      #   value: /var/data/pmms.db
      - key: ADMIN_PASSWORD
        sync: false      # set this value in the Render dashboard (kept out of git)
      - key: SESSION_TTL_HOURS
        value: "8"

    # Persistent disk — REQUIRES plan: starter or higher.
    # Uncomment and switch plans when you want data to persist.
    # disk:
    #   name: pmms-data
    #   mountPath: /var/data
    #   sizeGB: 1
